<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Virtual Piano</title>

<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
}

#piano {
    position: relative;
    width: 900px;
    margin: auto;
}

#piano img {
    width: 100%;
    display: block;
}

.white-key {
    position: absolute;
    width: 40px;
    height: 220px;
}

.black-key {
    position: absolute;
    width: 25px;
    height: 140px;
}
</style>
</head>
<body>

<h2>Click a Key</h2>

<div id="piano">
    <img src="keyboard.png" alt="Piano">

    <!-- All keys -->
    <div class="white-key" style="left:0px" onclick="playNote(130.81)"></div>
    <div class="black-key" style="left:25px" onclick="playNote(138.59)"></div>
    <div class="white-key" style="left:50px" onclick="playNote(146.83)"></div>
    <div class="black-key" style="left:75px" onclick="playNote(155.56)"></div>
    <div class="white-key" style="left:100px" onclick="playNote(164.81)"></div>
    <div class="white-key" style="left:125px" onclick="playNote(174.61)"></div>
    <div class="black-key" style="left:150px" onclick="playNote(185.00)"></div>
    <div class="white-key" style="left:175px" onclick="playNote(196.00)"></div>
    <div class="black-key" style="left:200px" onclick="playNote(207.65)"></div>
    <div class="white-key" style="left:225px" onclick="playNote(220.00)"></div>
    <div class="black-key" style="left:250px" onclick="playNote(233.08)"></div>
    <div class="white-key" style="left:275px" onclick="playNote(246.94)"></div>
    <div class="white-key" style="left:300px" onclick="playNote(261.63)"></div>
    
    <div class="black-key" style="left:325px" onclick="playNote(277.18)"></div>
    <div class="white-key" style="left:350px" onclick="playNote(293.66)"></div>
    <div class="black-key" style="left:375px" onclick="playNote(311.13)"></div>
    <div class="white-key" style="left:400px" onclick="playNote(329.63)"></div>
    <div class="white-key" style="left:425px" onclick="playNote(349.23)"></div>
    <div class="black-key" style="left:450px" onclick="playNote(369.99)"></div>
    <div class="white-key" style="left:475px" onclick="playNote(392.00)"></div>
    <div class="black-key" style="left:500px" onclick="playNote(415.30)"></div>
    <div class="white-key" style="left:525px" onclick="playNote(440.00)"></div>
    <div class="black-key" style="left:550px" onclick="playNote(466.16)"></div>
    <div class="white-key" style="left:575px" onclick="playNote(493.88)"></div>

    <div class="white-key" style="left:600px" onclick="playNote(523.25)"></div>
    <div class="key" style="left:625px" onclick="playNote(554.37)"></div>
    <div class="white-key" style="left:650px" onclick="playNote(587.33)"></div>
    <div class="key" style="left:675px" onclick="playNote(622.25)"></div>
    <div class="white-key" style="left:700px" onclick="playNote(659.25)"></div>
    <div class="white-key" style="left:725px" onclick="playNote(698.46)"></div>
    <div class="key" style="left:750px" onclick="playNote(739.99)"></div>
    <div class="white-key" style="left:775px" onclick="playNote(783.99)"></div>
    <div class="key" style="left:800px" onclick="playNote(830.61)"></div>
    <div class="white-key" style="left:825px" onclick="playNote(880.00)"></div>
    <div class="key" style="left:800px" onclick="playNote(932.33)"></div>
    <div class="white-key" style="left:825px" onclick="playNote(987.77)"></div>
</div>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "triangle";
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.001,
        ctx.currentTime + 1
    );

    osc.start();
    osc.stop(ctx.currentTime + 1);
}
</script>

</body>
</html>
